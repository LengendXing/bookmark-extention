<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookmarkAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      overflow: hidden;
      user-select: none;
    }

    /* ——— Header ——— */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid rgba(99,102,241,0.2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.1);
      color: #a5b4fc;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .settings-btn:hover {
      background: rgba(99,102,241,0.25);
      border-color: rgba(99,102,241,0.6);
      color: #c4b5fd;
    }

    /* ——— Main ——— */
    .main {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .status-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #6b7280;
      transition: color 0.3s;
    }
    .status-label.active { color: #a5b4fc; }

    /* ——— Toggle ——— */
    .toggle-wrapper {
      position: relative;
      width: 72px;
      height: 40px;
    }

    .toggle-wrapper input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 40px;
      background: #1f2937;
      border: 1.5px solid #374151;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #4b5563;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    input:checked + .toggle-track {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-color: #6366f1;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }

    input:checked + .toggle-track::after {
      left: calc(100% - 33px);
      background: #fff;
    }

    .toggle-track:active::after { width: 34px; }

    /* ——— Status desc ——— */
    .status-desc {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      max-width: 200px;
      line-height: 1.5;
      transition: color 0.3s;
    }
    .status-desc.active { color: #818cf8; }

    /* ——— Footer ——— */
    .footer {
      padding: 12px 20px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(255,255,255,0.02);
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4b5563;
      transition: background 0.3s;
    }
    .stat-dot.active {
      background: #6366f1;
      box-shadow: 0 0 6px #6366f1;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stat-text {
      font-size: 11px;
      color: #6b7280;
    }
    .stat-num {
      font-weight: 700;
      color: #a5b4fc;
    }

    /* ——— Config warning ——— */
    .config-warning {
      margin: 0 16px 12px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      font-size: 11px;
      color: #fbbf24;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .config-warning.visible { display: flex; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔖</div>
      <span class="logo-text">BookmarkAI</span>
    </div>
    <button class="settings-btn" id="settingsBtn" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Config Warning -->
  <div class="config-warning" id="configWarning">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    AI 未配置，书签不会被分析
  </div>

  <!-- Main -->
  <div class="main">
    <div class="status-label" id="statusLabel">监听已关闭</div>

    <label class="toggle-wrapper">
      <input type="checkbox" id="toggleSwitch" />
      <span class="toggle-track"></span>
    </label>

    <div class="status-desc" id="statusDesc">点击开关，开始监听新增书签</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="stat-badge">
      <div class="stat-dot" id="statDot"></div>
      <span class="stat-text">已处理 <span class="stat-num" id="countNum">0</span> 个书签</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
